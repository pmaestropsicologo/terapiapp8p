<style>

<div id="root"></div>

<script>
// Global error catcher
window.addEventListener('error', function(e) {
  showError((e.message || 'Unknown error'), e.error && e.error.stack ? e.error.stack : '');
});
window.addEventListener('unhandledrejection', function(e) {
  showError('Promise rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
});

function showError(msg, stack) {
  var errScreen = document.getElementById('error-screen');
  var errMsg = document.getElementById('error-msg');
  if (errScreen && errMsg) {
    errMsg.textContent = msg + (stack ? '\n\n' + stack : '');
    errScreen.classList.add('show');
    var ls = document.getElementById('loading-screen');
    if (ls) ls.style.display = 'none';
  }
}

function setStatus(s) {
  var el = document.getElementById('loading-status');
  if (el) el.textContent = s;
}

// Multi-CDN loader with fallback
function loadScript(urls, onLoad, onFail) {
  var idx = 0;
  function tryNext() {
    if (idx >= urls.length) { onFail(); return; }
    var url = urls[idx++];
    var s = document.createElement('script');
    s.src = url;
    s.crossOrigin = 'anonymous';
    s.onload = function() { onLoad(url); };
    s.onerror = function() {
      setStatus('Intentando otra fuente…');
      tryNext();
    };
    document.head.appendChild(s);
  }
  tryNext();
}

var REACT_URLS = [
  'https://unpkg.com/react@18.3.1/umd/react.production.min.js',
  'https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js'
];
var REACT_DOM_URLS = [
  'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js',
  'https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js'
];

setStatus('Cargando React…');
loadScript(REACT_URLS, function(u) {
  setStatus('Cargando ReactDOM…');
  loadScript(REACT_DOM_URLS, function(u2) {
    setStatus('Iniciando aplicación…');
    try {
      initApp();
    } catch (err) {
      showError('Init error: ' + err.message, err.stack || '');
    }
  }, function() {
    document.getElementById('error-hint').innerHTML = '<strong>Fallo al cargar ReactDOM.</strong><br>Comprueba tu conexión a Internet y vuelve a intentarlo. Si estás usando la app desde la pantalla de inicio, prueba primero a abrirla directamente en Safari.';
    showError('Failed to load ReactDOM from all CDN fallbacks');
  });
}, function() {
  document.getElementById('error-hint').innerHTML = '<strong>Fallo al cargar React.</strong><br>Comprueba tu conexión a Internet y vuelve a intentarlo. Si estás usando la app desde la pantalla de inicio, prueba primero a abrirla directamente en Safari.';
  showError('Failed to load React from all CDN fallbacks');
});

function initApp() {
const { useState, useEffect, useCallback, useRef } = React;
// ═══════════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════════
// Global reference to active patient & area for Feedback component
let _activePatientId = null;
let _activeAreaId = null;
const setActivePatientGlobal = (id) => { _activePatientId = id; };
const setActiveAreaGlobal = (id) => { _activeAreaId = id; };
const shuffle = a => [...a].sort(() => Math.random() - 0.5);
const pick = (a, n) => shuffle(a).slice(0, n);
const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const uid = () => Math.random().toString(36).slice(2, 10);
// ═══════════════════════════════════════════════════════════════
// PERSISTENCE — localStorage (only on this iPad)
// ═══════════════════════════════════════════════════════════════
const STORAGE_PREFIX = "terapiapp:";
const storeLoad = (k) => {
    try {
        const raw = localStorage.getItem(STORAGE_PREFIX + k);
        return raw ? JSON.parse(raw) : null;
    }
    catch (e) {
        return null;
    }
};
const storeSave = (k, v) => {
    try {
        localStorage.setItem(STORAGE_PREFIX + k, JSON.stringify(v));
    }
    catch (e) {
        console.warn("Storage failed:", e);
    }
};
// ═══════════════════════════════════════════════════════════════
// SOUND SYSTEM — Web Audio API (synthesized, no files)
// Sounds designed gentle for TEA/sensory-sensitive kids.
// Toggle via storage["soundOn"].
// ═══════════════════════════════════════════════════════════════
let _audioCtx = null;
const getCtx = () => {
    if (!_audioCtx) {
        try {
            _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        catch (e) {
            return null;
        }
    }
    if (_audioCtx.state === "suspended")
        _audioCtx.resume();
    return _audioCtx;
};
const soundEnabled = () => storeLoad("soundOn") !== false;
const playTone = (freq, duration = 0.15, type = "sine", gain = 0.15) => {
    if (!soundEnabled())
        return;
    const ctx = getCtx();
    if (!ctx)
        return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(gain, ctx.currentTime + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
};
const playSequence = (notes) => {
    if (!soundEnabled())
        return;
    const ctx = getCtx();
    if (!ctx)
        return;
    notes.forEach((n, i) => setTimeout(() => playTone(n.freq, n.dur || 0.12, n.type || "sine", n.gain || 0.15), i * (n.gap || 80)));
};
const sfx = {
    click: () => playTone(600, 0.04, "sine", 0.08),
    tap: () => playTone(800, 0.05, "triangle", 0.1),
    success: () => playSequence([{ freq: 523 }, { freq: 659 }, { freq: 784 }]),
    fail: () => playSequence([{ freq: 330, dur: 0.18 }, { freq: 262, dur: 0.22, gap: 140 }]),
    complete: () => playSequence([{ freq: 523 }, { freq: 659 }, { freq: 784 }, { freq: 1047, dur: 0.25, gap: 100 }]),
    unlock: () => playSequence([{ freq: 392 }, { freq: 523 }, { freq: 659 }, { freq: 784 }, { freq: 1047, dur: 0.3, gap: 90 }]),
    star: () => playTone(1200, 0.2, "sine", 0.12),
};
// ═══════════════════════════════════════════════════════════════
// CONFETTI — lightweight canvas-based celebration
// ═══════════════════════════════════════════════════════════════
let _confettiCanvas = null;
const getConfettiCanvas = () => {
    if (!_confettiCanvas) {
        _confettiCanvas = document.createElement("canvas");
        _confettiCanvas.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9998;";
        document.body.appendChild(_confettiCanvas);
    }
    _confettiCanvas.width = window.innerWidth;
    _confettiCanvas.height = window.innerHeight;
    return _confettiCanvas;
};
const fireConfetti = (intense = false) => {
    const canvas = getConfettiCanvas();
    const ctx = canvas.getContext("2d");
    const colors = ["#E76F51", "#2D6A4F", "#457B9D", "#E9C46A", "#7B2D8E", "#FF69B4", "#F4A261"];
    const count = intense ? 120 : 60;
    const particles = Array.from({ length: count }, () => ({
        x: canvas.width / 2 + (Math.random() - 0.5) * 200,
        y: canvas.height / 2,
        vx: (Math.random() - 0.5) * 14,
        vy: Math.random() * -18 - 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 8 + 4,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.3,
        shape: Math.random() > 0.5 ? "rect" : "circ",
    }));
    let frame = 0;
    const animate = () => {
        frame++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = 0;
        particles.forEach(p => {
            p.vy += 0.45;
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vr;
            if (p.y > canvas.height + 30)
                return;
            alive++;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            if (p.shape === "rect")
                ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.7);
            else {
                ctx.beginPath();
                ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        });
        if (alive > 0 && frame < 300)
            requestAnimationFrame(animate);
        else
            ctx.clearRect(0, 0, canvas.width, canvas.height);
    };
    animate();
};
// ═══════════════════════════════════════════════════════════════
// ADAPTIVE DIFFICULTY — learns from recent performance
// Every patient has per-activity difficulty that adjusts based on
// last 5 attempts. 3+ consecutive wins → up. 2+ consecutive fails → down.
// ═══════════════════════════════════════════════════════════════
const DIFF_LEVELS = ["fácil", "medio", "difícil"];
const getAdaptiveDiff = (patientId, activityId, defaultDiff = "medio") => {
    if (!patientId)
        return defaultDiff;
    const all = storeLoad("adaptiveDiff:" + patientId) || {};
    return all[activityId] || defaultDiff;
};
const updateAdaptiveDiff = (patientId, activityId, wasCorrect) => {
    if (!patientId || !activityId)
        return;
    const key = "adaptiveDiff:" + patientId;
    const all = storeLoad(key) || {};
    const histKey = "adaptiveHist:" + patientId + ":" + activityId;
    const hist = storeLoad(histKey) || [];
    hist.push(wasCorrect ? 1 : 0);
    if (hist.length > 5)
        hist.shift();
    storeSave(histKey, hist);
    const current = all[activityId] || "medio";
    const idx = DIFF_LEVELS.indexOf(current);
    // Last 3 all wins → level up
    if (hist.length >= 3 && hist.slice(-3).every(v => v === 1) && idx < 2) {
        all[activityId] = DIFF_LEVELS[idx + 1];
        storeSave(key, all);
        storeSave(histKey, []); // reset after adjustment
        return { changed: true, newLevel: all[activityId], direction: "up" };
    }
    // Last 2 fails → level down
    if (hist.length >= 2 && hist.slice(-2).every(v => v === 0) && idx > 0) {
        all[activityId] = DIFF_LEVELS[idx - 1];
        storeSave(key, all);
        storeSave(histKey, []);
        return { changed: true, newLevel: all[activityId], direction: "down" };
    }
    return { changed: false };
};
// ═══════════════════════════════════════════════════════════════
// SELF-PERCEPTION SCALE — after each activity, kid rates effort/mood
// ═══════════════════════════════════════════════════════════════
const saveSelfPerception = (patientId, activityId, mood, effort) => {
    if (!patientId)
        return;
    const key = "selfPerception:" + patientId;
    const all = storeLoad(key) || [];
    all.push({ ts: Date.now(), activity: activityId, area: _activeAreaId, mood, effort });
    if (all.length > 500)
        all.shift();
    storeSave(key, all);
};
// ═══════════════════════════════════════════════════════════════
// SESSION LOGGING — per-patient history of activities done
// ═══════════════════════════════════════════════════════════════
const logSession = (patientId, areaId, activityId, result) => {
    if (!patientId)
        return;
    const key = "sessions:" + patientId;
    const sessions = storeLoad(key) || [];
    sessions.push({
        ts: Date.now(),
        area: areaId,
        activity: activityId,
        result: result,
    });
    if (sessions.length > 500)
        sessions.shift();
    storeSave(key, sessions);
};
const getSessions = (patientId) => {
    if (!patientId)
        return [];
    return storeLoad("sessions:" + patientId) || [];
};
let _activeActivityId = null;
const setActiveActivityGlobal = (id) => { _activeActivityId = id; };
const logCurrentResult = (correct, attempts = 1) => {
    if (!_activePatientId || !_activeActivityId)
        return;
    logSession(_activePatientId, _activeAreaId, _activeActivityId, {
        correct, attempts, stars: correct ? 1 : 0,
    });
};
// ═══════════════════════════════════════════════════════════════
// PERSONAL BESTS — track highest scores per activity
// ═══════════════════════════════════════════════════════════════
const getBest = (patientId, activityId) => {
    if (!patientId)
        return null;
    const all = storeLoad("bests:" + patientId) || {};
    return all[activityId] || null;
};
const saveBest = (patientId, activityId, score) => {
    if (!patientId)
        return false;
    const all = storeLoad("bests:" + patientId) || {};
    const current = all[activityId] || 0;
    if (score > current) {
        all[activityId] = score;
        storeSave("bests:" + patientId, all);
        return true;
    }
    return false;
};
// ═══════════════════════════════════════════════════════════════
// SCORE & ACHIEVEMENTS SYSTEM
// Stars earned per-patient-per-activity, session score, badges
// ═══════════════════════════════════════════════════════════════
const ACHIEVEMENTS = [
    { id: "first_star", icon: "⭐", title: "Primera estrella", desc: "Gana tu primera estrella" },
    { id: "five_stars", icon: "🌟", title: "Cinco estrellas", desc: "Acumula 5 estrellas" },
    { id: "ten_stars", icon: "✨", title: "Diez estrellas", desc: "Acumula 10 estrellas" },
    { id: "twenty_stars", icon: "💫", title: "Veinte estrellas", desc: "Acumula 20 estrellas" },
    { id: "fifty_stars", icon: "🏆", title: "Maestro/a", desc: "Acumula 50 estrellas" },
    { id: "all_areas", icon: "🎯", title: "Explorador/a", desc: "Prueba las 6 áreas" },
    { id: "streak_3", icon: "🔥", title: "Racha de 3", desc: "3 aciertos seguidos" },
    { id: "streak_5", icon: "⚡", title: "Imparable", desc: "5 aciertos seguidos" },
    { id: "streak_10", icon: "👑", title: "Leyenda", desc: "10 aciertos seguidos" },
    { id: "perfect", icon: "💎", title: "¡Perfecto!", desc: "Completa una actividad sin fallos" },
];
const getPatientProgress = (patientId) => {
    if (!patientId)
        return { stars: 0, achievements: [], areas: [], streak: 0 };
    return storeLoad("progress:" + patientId) || { stars: 0, achievements: [], areas: [], streak: 0 };
};
const savePatientProgress = (patientId, progress) => {
    if (!patientId)
        return;
    storeSave("progress:" + patientId, progress);
};
// Global trigger for achievement popup (set by main App)
let _achievementTrigger = null;
const unlockAchievement = (patientId, achId) => {
    if (!patientId)
        return;
    const progress = getPatientProgress(patientId);
    if (progress.achievements.includes(achId))
        return;
    progress.achievements.push(achId);
    savePatientProgress(patientId, progress);
    sfx.unlock();
    if (_achievementTrigger)
        _achievementTrigger(achId);
};
const addStar = (patientId, areaId, perfect = false) => {
    if (!patientId)
        return null;
    const progress = getPatientProgress(patientId);
    progress.stars = (progress.stars || 0) + 1;
    progress.streak = (progress.streak || 0) + 1;
    if (areaId && !progress.areas.includes(areaId))
        progress.areas.push(areaId);
    savePatientProgress(patientId, progress);
    sfx.star();
    // Check achievements
    if (progress.stars === 1)
        unlockAchievement(patientId, "first_star");
    if (progress.stars === 5)
        unlockAchievement(patientId, "five_stars");
    if (progress.stars === 10)
        unlockAchievement(patientId, "ten_stars");
    if (progress.stars === 20)
        unlockAchievement(patientId, "twenty_stars");
    if (progress.stars === 50)
        unlockAchievement(patientId, "fifty_stars");
    if (progress.areas.length >= 6)
        unlockAchievement(patientId, "all_areas");
    if (progress.streak >= 3)
        unlockAchievement(patientId, "streak_3");
    if (progress.streak >= 5)
        unlockAchievement(patientId, "streak_5");
    if (progress.streak >= 10)
        unlockAchievement(patientId, "streak_10");
    if (perfect)
        unlockAchievement(patientId, "perfect");
    return progress;
};
const breakStreak = (patientId) => {
    if (!patientId)
        return;
    const progress = getPatientProgress(patientId);
    progress.streak = 0;
    savePatientProgress(patientId, progress);
};
// ═══════════════════════════════════════════════════════════════

// ANTI-REPETITION HISTORY CACHE
// Maintains a rolling window of recently generated content per
// activity type, fed back into prompts to avoid repetitions.
// ═══════════════════════════════════════════════════════════════
const HISTORY_CACHE = {};
const HISTORY_LIMIT = 15;
const getHistory = (activityKey) => HISTORY_CACHE[activityKey] || [];
const addToHistory = (activityKey, item) => {
    if (!HISTORY_CACHE[activityKey])
        HISTORY_CACHE[activityKey] = [];
    HISTORY_CACHE[activityKey].push(item);
    if (HISTORY_CACHE[activityKey].length > HISTORY_LIMIT) {
        HISTORY_CACHE[activityKey].shift();
    }
};
const formatHistoryForPrompt = (activityKey) => {
    const hist = getHistory(activityKey);
    if (hist.length === 0)
        return "";
    return `\n\nIMPORTANTE — NO repitas ni varíes ligeramente estos ${hist.length} elementos ya generados recientemente (debes generar algo claramente distinto en tema, objetos, personajes o contexto):\n${hist.map((h, i) => `${i + 1}. ${h}`).join("\n")}`;
};
